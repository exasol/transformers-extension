[tool.poetry]
name = "exasol-transformers-extension"
version = "0.10.0"
description = "An Exasol extension to use state-of-the-art pretrained machine learning models via the transformers api."

authors = [
    	"Umit Buyuksahin <umit.buyuksahin@exasol.com>",
    	"Torsten Kilias <torsten.kilias@exasol.com>"
]

readme = 'README.md'

repository = "https://github.com/exasol/transformers-extension"
homepage = "https://github.com/exasol/transformers-extension"

keywords = ['exasol']

[tool.poetry.dependencies]
python = "^3.8.0"
pandas = ">=1.4.2,<2.0.0"
torch = "^2.0.1"
transformers = {extras = ["torch"], version = "^4.36.2"}
Jinja2 = "^3.0.3"
importlib-resources = "^5.4.0"
click = "^8.0.4"
pyexasol = "^0.25.0"
exasol-bucketfs = ">=0.9.0,<1.0.0"
tenacity = "^8.2.2"
sacremoses = ">=0.0.53"


[tool.poetry.dev-dependencies]
pytest = "^7.2.0"
exasol-udf-mock-python = "^0.1.0"
exasol-script-languages-container-tool = "^0.18.2"
toml = "^0.10.2"

[tool.poetry.group.dev.dependencies]
nox = "^2022.8.7"
exasol-toolbox = "^0.8.0"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

#-------python toolbox config------------

[tool.coverage.run]
relative_files = true
source = [
    "exasol",
]

[tool.coverage.report]
fail_under = 15


[tool.black]
line-length = 88
verbose = false
include = "\\.pyi?$"


[tool.isort]
profile = "black"
force_grid_wrap = 2


[tool.pylint.master]
fail-under = 7.5
output-format = "colorized,json:.lint.json,text:.lint.txt"

[tool.pylint.format]
max-line-length = 88
max-module-lines = 800


[[tool.mypy.overrides]]
module = [
    "language_container.*",
    "tests.fixtures.*",
    "tests.unit_tests.*",
    "tests.integration_tests.*",
    "tests.utils.*"
]
ignore_errors = true

[tool.poetry.scripts]
tbx = 'exasol.toolbox.tools.tbx:CLI'
