name: Onprem Integration Tests

on:
  workflow_call:
    secrets:
      DOCKER_USER:
          required: true
      DOCKER_PASSWORD:
          required: true

jobs:
  run-onprem-integration-tests:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python_version:
          - "3.10"
    runs-on:
      labels: int-linux-x64-4core-ubuntu24.04-1
    name: Onprem Integration Tests
    steps:
      - name: Check out Repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Free Disk Space
        id: free-disk-space
        uses: ./.github/actions/free-diskspace

      - name: Setup Python & Poetry Environment
        uses: exasol/python-toolbox/.github/actions/python-environment@v10
        with:
          python-version: '${{ matrix.python_version }}'
          poetry-version: '2.3.0'

      - name: Allow unprivileged user namespaces
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: Start test Docker-DB
        run: poetry run -- nox -s start_database

      - name: Run test onprem_integration_tests
        run: poetry run -- nox -s onprem_integration_tests
        env: # Set the secret as an input
          DOCKER_USER: ${{ secrets.DOCKER_USER }}
          DOCKER_PASSWD: ${{ secrets.DOCKER_PASSWORD }}
